AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Drunken Groove Society - Music Listening Session App

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 29
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref SessionsTable
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        ALLOWED_ORIGIN: !Sub 'https://${CloudFrontDistribution.DomainName}'

Parameters:
  AnthropicApiKey:
    Type: String
    Default: PLACEHOLDER
    NoEcho: true
    Description: Anthropic API key for summary generation (leave PLACEHOLDER until key is ready)

Resources:

  # ── API ────────────────────────────────────────────────────────────────────

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      CorsConfiguration:
        AllowOrigins:
          - !Sub 'https://${CloudFrontDistribution.DomainName}'
          - 'http://localhost:5173'
        AllowMethods:
          - GET
          - PUT
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        MaxAge: 300

  # ── Lambda functions ───────────────────────────────────────────────────────

  GetSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: dist/handlers/getSession.handler
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /sessions/{id}
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable

  PutSessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: dist/handlers/putSession.handler
      Events:
        Put:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /sessions/{id}
            Method: PUT
      Policies:
        - DynamoDBWritePolicy:
            TableName: !Ref SessionsTable

  GetNotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: dist/handlers/getNotes.handler
      Events:
        Get:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /sessions/{id}/notes
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable

  PutNotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: dist/handlers/putNotes.handler
      Events:
        Put:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /sessions/{id}/notes
            Method: PUT
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBWritePolicy:
            TableName: !Ref SessionsTable

  LookupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: dist/handlers/lookup.handler
      Timeout: 30
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /lookup
            Method: POST

  GenerateSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: dist/handlers/generateSummary.handler
      Timeout: 60
      Events:
        Post:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /summary
            Method: POST

  # ── DynamoDB ───────────────────────────────────────────────────────────────

  SessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: drunken-groove-society
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Frontend hosting ───────────────────────────────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'dgs-frontend-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: dgs-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

Outputs:
  ApiEndpoint:
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Export:
      Name: DGS-ApiEndpoint
  CloudFrontURL:
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: DGS-CloudFrontURL
  FrontendBucketName:
    Value: !Ref FrontendBucket
    Export:
      Name: DGS-FrontendBucket
  SessionsTableName:
    Value: !Ref SessionsTable
    Export:
      Name: DGS-SessionsTable
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: DGS-CloudFrontDistributionId
